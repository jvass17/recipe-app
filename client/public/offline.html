<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#15803d" />
    <title>Offline — Recipes</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: system-ui, sans-serif;
        line-height: 1.5;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 1.5rem;
        background: #f8fafc;
        color: #0f172a;
      }
      @media (prefers-color-scheme: dark) {
        body {
          background: #0f172a;
          color: #f8fafc;
        }
      }
      .card {
        max-width: 28rem;
        border-radius: 0.75rem;
        border: 1px solid #e2e8f0;
        padding: 1.5rem;
        background: white;
      }
      @media (prefers-color-scheme: dark) {
        .card {
          border-color: #334155;
          background: #1e293b;
        }
      }
      a {
        color: #15803d;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1 style="margin-top: 0">You are offline</h1>
      <p>
        This page is shown when navigation cannot reach the network. Open the app from the home screen
        to use cached screens, or try again when you are back online.
      </p>
      <p><a href="/">Back to app</a></p>
    </main>
  </body>
</html>
